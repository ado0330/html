<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .button1 {
            background-color: black;
            color: white;
            height: 36px;
            width: 100px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 8px;
        }
        .button1:hover {
            opacity: 0.8;
        }

        .button2 {
            background-color:rgb(255, 196, 0);
            border: none;
            border-radius: 15px;
            height: 36px;
            width: 150px;
            font-weight: bold;
            margin-right: 8px;
            cursor: pointer;

        }

        .button2:hover {
            background-color:rgb(255, 186, 0);
        }

        .button3 {
            background-color: rgb(40, 155, 69);
            border-radius: 10px;
            height: 36px;
            width: 80px;
            color: white;
            border: none;
            cursor: pointer;
            transition: box-shadow 0.15s;
        }

        .button3:hover {
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
        }

    </style>
    <button class="button1">Request now</button>
    <button class="button2">Add to Cart</button>
    <button class="button3">Sign up</button>
</body>
</html>
