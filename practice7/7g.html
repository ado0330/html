<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .profile_pic {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50px;
            vertical-align: middle;
            margin-right: 10px;
        }
        .tweet_textbox {
            vertical-align: middle;
            width: 500px;
            font-size: 30px;
            border: none;
        }

        .tweet_button {
            font-weight: bold;
            vertical-align: middle;
            background-color: rgb(102, 177, 252);
            color: white;
            padding-left: 30px;
            padding-right: 30px;
            padding-top: 10px;
            padding-bottom: 10px;
            border: none;
            border-radius: 30px;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <img class="profile_pic" src="Libai_touxiang.jpg" alt="">
    <input class="tweet_textbox" type="text" placeholder="What's happening?">
    <button class="tweet_button">Tweet</button>
</body>
</html>
