<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        p{
            font-family: Arial;
            font-size: 20px;
            margin-top: 0px;
            margin-bottom: 8px;
        }

        input {
            display: block;
            border: none;
            background-color: rgba(240, 240, 240);
            width: 200px;
            font-size: 8px;
            margin-bottom: 8px;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 12px;
            
        }

        button {
            font-size: 8px;
            padding-top: 6px;
            padding-bottom: 6px;
            padding-left: 8px;
            padding-right: 8px;
            border: none;
            margin-right: 8px;
            cursor: pointer;
        }

        .request_Button {
            background-color: black;
            color: white;
        }

    </style>

</head>
<body>
    <p>Request a ride now</p>
    <input type="text" placeholder="Enter pickup location">
    <input type="text" placeholder="Enter destination">
    <button class="request_Button">Request now</button>
    <button>Schedule for later</button>
</body>
</html>
