<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .google_logo {
            width: 400px;
            margin-bottom: 12px;
            margin-top: 100px;
        }

        input {
            font-size: 16px;
            margin-left: 25px;
            width: 600px;
            padding-top: 13px;
            padding-bottom: 13px;
            padding-left: 20px;
            border: none;
            border-radius: 30px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        div {
            text-align: center;
        }

        button {
            font-weight: bold;
            font-size: 16px;
            border: none;
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 12px;
            padding-bottom: 12px;
            cursor: pointer;
        }

        .searchButton {
            margin-right: 10px;
        }

        


    </style>

</head>
<body>
    <div>
        <img class="google_logo" src="google_logo.svg" alt="">
    </div>
    <div>
        <input type="text" placeholder="Search Google or try a URL">
    </div>
    <div>
        <button class="searchButton">Google Search</button>
        <button>I'm Feeling Lucky</button>
    </div>
</body>
</html>
