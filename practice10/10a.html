<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>

    <style>

        p {
            font-size: 12px;
            font-family: Arial;
            margin-top: 3px;
            margin-bottom: 3px;
        }

        .profile_pic {
            display: inline-block;
            border-radius: 50px;
            width: 36px;
            height: 36px;
            object-fit: cover;
            vertical-align: middle;
        }

        .user_info {
            display: inline-block;
            width: 150px;
            vertical-align: middle;
            margin-left: 10px;
        }

        .follow_button {
            vertical-align: middle;
            border: none;
            background-color: rgba(64, 147, 240);
            color: white;
            font-weight: bold;
            font-size: 14px;
            border-radius: 5px;
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 8px;
            padding-bottom: 8px;
            cursor: pointer;
        }

        .user_name {
            font-weight: bold;
        }

        .description {
            color: gray;
        }

        .suggestions {
            display: inline-block;
        }


    </style>

</head>
<body>
    <div class="suggestions">
        <img class="profile_pic" src="Libai_touxiang.jpg" alt="">
        <div class="user_info">
            <p class="user_name">Jason</p>
            <p class="description">the programmer</p>
            <p class="description">popular</p>
        </div>
            <button class="follow_button">Follow</button>
    </div>
    <div class="suggestions">
        <img class="profile_pic" src="Libai_touxiang.jpg" alt="">
        <div class="user_info">
            <p class="user_name">Jason</p>
            <p class="description">the programmer</p>
            <p class="description">popular</p>
        </div>
            <button class="follow_button">Follow</button>
    </div>


</body>
</html>
